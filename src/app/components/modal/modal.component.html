<!-- Modal Backdrop -->
<div class="modal-backdrop" *ngIf="show" [class.show]="show" (click)="onBackdropClick($event)"></div>

<!-- Modal -->
<div class="modal" *ngIf="show" [class.show]="show" (click)="onBackdropClick($event)">
  <div class="modal-dialog" [ngClass]="getSizeClass()">
    <div class="modal-content">

      <!-- Modal Header -->
      <div class="modal-header">
        <h5 class="modal-title">{{ config.title |translate }}</h5>
        <button
          *ngIf="config.showCloseButton !== false"
          type="button"
          class="btn-close"
          (click)="onClose()"
          aria-label="Close">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <!-- Modal Body -->
      <div class="modal-body">

        <!-- Custom Content -->
        <div *ngIf="config.content" [innerHTML]="config.content"></div>

        <!-- View Mode - Display Data -->
        <div *ngIf="mode === 'view' && data && !config.fields" class="view-mode">
          <div class="row">
            <div class="col-12 col-md-6 mb-3" *ngFor="let item of data | keyvalue">
              <div class="row">
                <div class="col-5 text-muted">
                  <strong>{{ (item.key?.toString() || '') | titlecase  | translate}}:</strong>
                </div>
                <div class="col-7">
                  <span class="form-control-plaintext">{{ formatDisplayValue(item.value) | translate }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Form Fields -->
        <div *ngIf="config.fields" class="form-fields" [class.view-mode]="mode === 'view'">
          <!-- View Mode -->
          <div *ngIf="mode === 'view'" class="row">
            <div class="col-12 col-md-6 mb-3" *ngFor="let field of config.fields">
              <div class="row">
                <div class="col-5">
                  <strong>{{ field.label | translate}}:</strong>
                </div>
                <div class="col-7">
                  <!-- Image Display for File Type -->
                  <div *ngIf="field.type === 'file' && field.id === 'instituteImage' && getDisplayValue(field.id)" class="view-image-container">
                    <img [src]="getDisplayValue(field.id)" alt="Institute Image" class="view-image" style="max-width: 200px; max-height: 150px; border-radius: 8px; border: 1px solid #ddd;">
                  </div>
                  <!-- Regular Text Display -->
                  <span *ngIf="field.type !== 'file'" class="form-control-plaintext">{{ formatDisplayValue(getDisplayValue(field.id), field.type) }}</span>
                  <!-- File Field with No Image -->
                  <span *ngIf="field.type === 'file' && !getDisplayValue(field.id)" class="form-control-plaintext text-muted">{{'No image available'|translate}}</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Edit/Create Mode with Responsive Grid -->
          <div *ngIf="mode !== 'view'" class="row">
            <div class="col-12 col-md-6 mb-3" *ngFor="let field of config.fields">
              <label [for]="field.id" class="form-label">
                {{ field.label }}
                <span *ngIf="field.required" class="text-danger">*</span>
              </label>

              <!-- Text Input -->
              <input
                *ngIf="field.type === 'text' || field.type === 'email' || field.type === 'password' || field.type === 'tel'"
                [type]="field.type"
                [id]="field.id"
                class="form-control"
                [placeholder]="field.placeholder || ''"
                [required]="field.required || false"
                [disabled]="field.disabled || false"
                [pattern]="field.pattern || ''"
                [(ngModel)]="formData[field.id]"
                (ngModelChange)="onFieldChange(field.id, $event)">

              <!-- Number Input -->
              <input
                *ngIf="field.type === 'number'"
                type="number"
                [id]="field.id"
                class="form-control"
                [placeholder]="field.placeholder || ''"
                [required]="field.required || false"
                [disabled]="field.disabled || false"
                [min]="field.min || null"
                [max]="field.max || null"
                [(ngModel)]="formData[field.id]"
                (ngModelChange)="onFieldChange(field.id, $event)">

              <!-- Date Input -->
              <input
                *ngIf="field.type === 'date'"
                type="date"
                [id]="field.id"
                class="form-control"
                [required]="field.required || false"
                [disabled]="field.disabled || false"
                [(ngModel)]="formData[field.id]"
                (ngModelChange)="onFieldChange(field.id, $event)">

              <!-- Textarea -->
              <textarea
                *ngIf="field.type === 'textarea'"
                [id]="field.id"
                class="form-control"
                [placeholder]="field.placeholder || ''"
                [required]="field.required || false"
                [disabled]="field.disabled || false"
                [rows]="field.rows || 3"
                [(ngModel)]="formData[field.id]"
                (ngModelChange)="onFieldChange(field.id, $event)"></textarea>

              <!-- File Input with Image Preview -->
              <div *ngIf="field.type === 'file'">
                <!-- Current Image Display (for edit mode) -->
                <div *ngIf="mode === 'edit' && data.instituteImageUrl && field.id === 'instituteImage'" class="current-image-container mb-3">
                  <div class="current-image-wrapper">
                    <img [src]="data.instituteImageUrl" alt="Current Institute Image" class="current-image">
                  </div>
                </div>

                <!-- File Input -->
                <input
                  type="file"
                  [id]="field.id"
                  class="form-control"
                  [accept]="field.accept || ''"
                  [multiple]="field.multiple || false"
                  [required]="field.required || false"
                  [disabled]="field.disabled || false"
                  (change)="onFileChange(field.id, $event)">

                <!-- New Image Preview -->
                <div *ngIf="getFilePreview(field.id)" class="new-image-container mt-3">
                  <label class="form-label">{{'New Image Preview:'| translate}}</label>
                  <div class="new-image-wrapper">
                    <img [src]="getFilePreview(field.id)" alt="New Image Preview" class="new-image">
                    <button type="button" class="btn btn-sm btn-danger remove-image-btn" (click)="removeFilePreview(field.id)">
                      <i class="bi bi-x"></i> {{'Remove' | translate}}
                    </button>
                  </div>
                </div>
              </div>

              <!-- Select Dropdown -->
              <select
                *ngIf="field.type === 'select'"
                [id]="field.id"
                class="form-control"
                [required]="field.required || false"
                [disabled]="field.disabled || false"
                [multiple]="field.multiple || false"
                [(ngModel)]="formData[field.id]"
                (ngModelChange)="onFieldChange(field.id, $event)">
                <option [value]="null" disabled selected>{{ field.placeholder || 'Select an option' }}</option>
                <option *ngFor="let option of field.options" [value]="option.value">
                  {{ option.label | translate}}
                </option>
              </select>

              <!-- Checkbox -->
              <div *ngIf="field.type === 'checkbox'" class="form-check">
                <input
                  type="checkbox"
                  [id]="field.id"
                  class="form-check-input"
                  [required]="field.required || false"
                  [disabled]="field.disabled || false"
                  [(ngModel)]="formData[field.id]"
                  (ngModelChange)="onFieldChange(field.id, $event)">
                <label class="form-check-label" [for]="field.id">
                  {{ field.placeholder || field.label  | translate}}
                </label>
              </div>

              <!-- Radio Buttons -->
              <div *ngIf="field.type === 'radio'" class="radio-group">
                <div class="form-check" *ngFor="let option of field.options">
                  <input
                    type="radio"
                    [id]="field.id + '_' + option.value"
                    [name]="field.id"
                    class="form-check-input"
                    [value]="option.value"
                    [required]="field.required || false"
                    [disabled]="field.disabled || false"
                    [(ngModel)]="formData[field.id]"
                    (ngModelChange)="onFieldChange(field.id, $event)">
                  <label class="form-check-label" [for]="field.id + '_' + option.value">
                    {{ option.label | translate}}
                  </label>
                </div>
              </div>

            </div>
          </div>
        </div>

      </div>

      <!-- Modal Footer -->
      <div class="modal-footer" *ngIf="config.showFooter !== false">
        <!-- View Mode Footer - Only Close Button -->
        <ng-container *ngIf="mode === 'view'">
          <button
            type="button"
            class="btn btn-secondary"
            (click)="onClose()">
            {{'Close'|translate}}
          </button>
        </ng-container>

        <!-- Edit/Create Mode Footer - Action Buttons -->
        <ng-container *ngIf="mode !== 'view'">
          <button
            *ngIf="config.secondaryButtonText"
            type="button"
            class="btn btn-outline-secondary"
            (click)="onSecondaryAction()">
            {{ config.secondaryButtonText | translate}}
          </button>
          <button
            *ngIf="config.primaryButtonText"
            type="button"
            class="btn btn-primary"
            (click)="onPrimaryAction()">
            {{ config.primaryButtonText | translate}}
          </button>
          <button
            *ngIf="!config.primaryButtonText && !config.secondaryButtonText"
            type="button"
            class="btn btn-primary"
            (click)="onClose()">
            {{'Close'|translate}}
          </button>
        </ng-container>
      </div>

    </div>
  </div>
</div>
