<nav class="navbar navbar-expand-lg custom-navbar px-4">
  <div class="navbar-brand-container">
    <a class="navbar-brand" href="#">
      <div class="brand-icon">
        <i class="bi bi-award-fill"></i>
      </div>
      <div class="brand-text">
        <span class="brand-title">National Dairy Development</span>
        <span class="brand-subtitle">Training Management System</span>
      </div>
    </a>
  </div>
  
  <div class="navbar-actions ms-auto">
    <div class="user-profile-section">
      <ng-container *ngIf="user; else guest">
        <div class="user-info">
          <div class="user-details">
            <span class="user-name">{{ user.username || 'User' }}</span>
            <span class="user-role">{{ user.email }}</span>
          </div>
          <div class="user-avatar">
            <div class="default-avatar">
              <i class="bi bi-person-fill"></i>
            </div>
          </div>
        </div>
      </ng-container>
      <ng-template #guest>
        <div class="guest-profile">
          <div class="default-avatar">
            <i class="bi bi-person-fill"></i>
          </div>
        </div>
      </ng-template>
    </div>
    
    <div class="header-actions">
      <button class="action-btn notification-btn" title="Notifications">
        <i class="bi bi-bell"></i>
        <span class="notification-badge">3</span>
      </button>
      <button class="action-btn settings-btn" title="Settings">
        <i class="bi bi-gear"></i>
      </button>
    </div>
  </div>
</nav>
