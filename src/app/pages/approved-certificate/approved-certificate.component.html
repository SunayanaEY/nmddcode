<div class="approved-certificate-container">
  <app-breadcrumb [items]="breadcrumbItems"></app-breadcrumb>

  <div class="page-header">
    <h2>{{'Approved Certificate'|translate}}</h2>
  </div>

  <div class="filter-container">
    <div class="filter-controls">
      <!-- Date Filter -->
      <input
        type="date"
        class="form-control"
        [(ngModel)]="filters.date"
        placeholder="Date"
      />

      <!-- Training Title Search -->
      <input
        type="text"
        class="form-control"
        [(ngModel)]="filters.trainingTitle"
        placeholder="Search by Training Title"
      />

      <!-- Status Filter -->
      <select class="form-control" [(ngModel)]="filters.status">
        <option value="ALL">All</option>
        <option value="PENDING">Pending</option>
        <option value="APPROVED">Approved</option>
        <option value="REJECTED">Rejected</option>
      </select>
    </div>

    <!-- <div class="action-buttons">
      <button class="btn btn-outline-primary">
        <i class="bi bi-upload"></i> Export as Excel
      </button>
      <button class="btn btn-primary">
        <i class="bi bi-download"></i> Download Zip
      </button>
    </div> -->
  </div>

  <!-- <div class="trainings-summary">
    <h4>{{'Trainees List'|translate}}</h4>
    <span class="badge bg-secondary"
      >{{'Total trainees'|translate}} : {{ filteredTableData.length }}</span
    >
  </div> -->

  <app-table
    [columns]="tableColumns"
    [data]="filteredTableData"
    [actions]="tableActions"
    [isExportCSV]="isExportCSV"
    [isExportPDF]="isExportPdf"
    (actionClick)="handleTableAction($event)"
  >
  </app-table>

  <!-- Modal -->
  <div
    class="modal fade"
    id="viewCertificateModal"
    tabindex="-1"
    aria-labelledby="viewCertificateModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content p-4">
        <div class="modal-header">
          <h5 class="modal-title" id="viewCertificateModalLabel">
            {{'Approved Certificate'|translate}}
          </h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body">
          <!-- 🔄 Load certificate only if selectedItem exists -->
          <ng-container *ngIf="selectedItem">
            <app-new-certificate-layout
              [data]="selectedItem"
            ></app-new-certificate-layout>
          </ng-container>
        </div>
      </div>
    </div>
  </div>
</div>
