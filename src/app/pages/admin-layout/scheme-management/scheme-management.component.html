<div class="approved-certificate-container">
  <app-breadcrumb [items]="breadcrumbItems"></app-breadcrumb>

  <div class="page-header">
    <h2>{{'All Schemes'|translate}}</h2>
  </div>

  <div class="trainings-summary">
    <span class="badge bg-secondary">{{'Total'|translate}} - {{ schemeList.length }} {{'Schemes'|translate}}</span>
  </div>

  <app-table [columns]="tableColumns" [data]="schemeListProcessed" [actions]="tableActions"
    (actionClick)="handleTableAction($event)" [isExportCSV]="isExportCSV" [isExportPDF]="isExportPdf"
    [pdfHeaders]="pdfHeaders" [columnKeys]="columnKeys" [fileName]="fileName" [tableName]="table" [addNew]="addNew">
  </app-table>
</div>


<ng-template #schemeConfirmationModal let-modal>

  <div class="modal-header bg-appColor" style="
      background-color: #155e91;
      color:white !important;
  ">
    <h3 class="my-auto text-white">{{'Confirmation'}}</h3>
    <button type="button" class="close" aria-label="Close" (click)="modal.dismiss('Cross click')">

      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    <div class="row">
      <div class="col-md-12">
        <div class="d-flex mr-4">
          <h4 class="my-auto mr-2 ">
            {{confirmationMessage | translate}}
          </h4>
        </div>
      </div>

    </div>


  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-primary" (click)="confirm()" style="background-color: #155e91;">
      {{'confirm'| translate}}
    </button>
    <button type="button" class="btn btn-primary" (click)="modal.dismiss('Close click')"
      style="background-color: #155e91;">
      {{'close' | translate}}
    </button>
  </div>
</ng-template>
