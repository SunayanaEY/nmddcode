<div class="map-wrapper" style="background: rgba(255, 255, 255, 0.1)">
  <!-- Loading State -->
  <div *ngIf="isLoading" class="map-loading">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">{{ "Loading map..." | translate }}</span>
    </div>
    <p class="mt-2 text-muted">{{ "Loading India map..." | translate }}</p>
  </div>

  <!-- Map Container - Always present for ViewChild -->
  <div
    class="map-container"
    #mapContainer
    [style.display]="isLoading ? 'none' : 'block'"
  >
    <!-- Map will be rendered here by D3.js -->
  </div>

  <!-- Map Controls -->
  <div *ngIf="!isLoading" class="map-controls">
    <button
      class="btn btn-sm btn-outline-primary"
      (click)="resetZoom()"
      title="Reset Zoom"
    >
      <i class="fas fa-expand-arrows-alt"></i>
    </button>
  </div>

  <!-- Selected State Info -->
  <div *ngIf="selectedState && !isLoading" class="selected-state-info">
    <div class="state-info-card">
      <h6 class="state-name">{{ selectedState.stateName }}</h6>
      <div class="state-stats">
        <div class="stat-item">
          <span class="stat-label">State ID:</span>
          <span class="stat-value">{{ selectedState.stateId }}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">State Name:</span>
          <span class="stat-value">{{ selectedState.stateName }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Legend -->
  <div *ngIf="!isLoading" class="map-legend">
    <div class="legend-item">
      <div class="legend-color" style="background-color: #24a8efde"></div>
      <span class="legend-text">{{ "States" | translate }}</span>
    </div>
    <div class="legend-item">
      <div class="legend-marker"></div>
      <span class="legend-text">{{ "Training Institutes" | translate }}</span>
    </div>
  </div>
</div>
