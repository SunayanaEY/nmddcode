<div class="row g-4">
  <div class="col-lg-3 col-md-6" *ngFor="let card of getStatsCards(); let i = index">
    <div class="stats-card" [style.background]="card.bgColor">
      <!-- Loading State -->
      <div *ngIf="isLoading" class="loading-skeleton">
        <div class="skeleton-icon"></div>
        <div class="skeleton-content">
          <div class="skeleton-title"></div>
          <div class="skeleton-value"></div>
          <div class="skeleton-growth"></div>
        </div>
      </div>

      <!-- Card Content -->
      <div *ngIf="!isLoading" class="stats-card-content">
        <!-- Icon -->
        <div class="stats-icon-wrapper">
          <i [class]="card.icon" [style.color]="card.iconColor"></i>
        </div>

        <!-- Card Body -->
        <div class="stats-body">
          <!-- Title -->
          <h6 class="stats-title" [style.color]="card.textColor">
            {{ card.title |translate}}
          </h6>

          <!-- Value -->
          <div class="stats-value" [style.color]="card.textColor">
            {{ formatNumber(card.value) }}
          </div>

          <!-- Growth Indicator -->
          <div class="stats-growth">
            <span class="growth-indicator" [class]="getGrowthClass(card.growth)">
              <i [class]="getGrowthIcon(card.growth)" class="me-1"></i>
              {{ Math.abs(card.growth) }}% {{ card.growthText |translate }}
            </span>
          </div>
        </div>
      </div>

      <!-- Download Button -->
      <div *ngIf="!isLoading" class="stats-card-footer">
        <button 
          class="btn btn-download" 
          (click)="downloadData(card.category, card.title)"
          [style.color]="card.textColor"
          [attr.aria-label]="'Download ' + card.title + ' data'"
          tabindex="0">
          <i class="fas fa-download"></i>
          <span>{{'Download Data' | translate}}</span>
        </button>
      </div>
    </div>
  </div>
</div>
