<div class="chart-container">
  <div class="chart-header d-flex justify-content-between align-items-center mb-3">
    <div class="chart-info">
      <!-- Info or Title can go here if needed -->
    </div>
    <div class="chart-actions">
      <button
        class="btn btn-sm btn-outline-primary"
        (click)="refreshChart()"
        [disabled]="chartLoading"
        title="Refresh Chart">
        <i class="fas fa-sync-alt" [class.fa-spin]="chartLoading"></i>
      </button>
    </div>
  </div>

  <div class="chart-content" [class.loading]="chartLoading">
    <div *ngIf="chartLoading" class="chart-loading-overlay">
      <div class="loading-spinner">
        <i class="fas fa-spinner fa-spin fa-2x text-primary"></i>
        <p class="mt-2 text-muted">{{'Loading chart data...'|translate}}</p>
      </div>
    </div>

    <div class="chart-wrapper" [style.opacity]="chartLoading ? '0.3' : '1'">
      <div
        echarts
        [options]="chartOption"
        [loading]="chartLoading"
        (chartInit)="onChartInit($event)"
        class="private-institute-type-chart">
      </div>
    </div>

    <!-- Chart Statistics -->
    <div class="chart-stats mt-3" *ngIf="!chartLoading">
      <div class="row g-2">
        <div class="col-12 col-md-6" *ngFor="let item of getChartData()">
          <div class="stat-card">
            <div class="stat-icon" [style.background-color]="item.color + '20'">
              <i class="fas fa-building" [style.color]="item.color"></i>
            </div>
            <div class="stat-content">
              <div class="stat-label">{{ item.type }}</div>
              <div class="stat-value">{{ item.percentage }}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
