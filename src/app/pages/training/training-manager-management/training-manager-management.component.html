<div class="container-fluid">
  <!-- Breadcrumb -->
  <app-breadcrumb [items]="breadcrumbItems"></app-breadcrumb>
  
  <!-- Register New Training Manager Button -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h2 class="page-title mb-0">
            <i class="fas fa-users me-2 text-primary"></i>
            Training Manager Management
          </h2>
          <p class="text-muted mb-0">
            Manage training managers and their registrations
          </p>
        </div>
        <div>
          <button 
            class="btn btn-primary btn-lg" 
            (click)="toggleRegistrationForm()"
            [class.active]="showRegistrationForm">
            <i class="fas fa-user-plus me-2"></i>
            {{ showRegistrationForm ? 'Hide Form' : 'Register New Training Manager' }}
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- User Profile Creation Component (Conditional) -->
  <div *ngIf="showRegistrationForm" class="registration-form-section mb-4">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="card-title mb-0">
          <i class="fas fa-user-plus me-2"></i>
          Register New Training Manager
        </h5>
      </div>
      <div class="card-body">
        <app-user-profile-creation (formSubmissionSuccess)="onFormSubmissionSuccess()"></app-user-profile-creation>
      </div>
    </div>
  </div>
  
  <!-- Registered Data Entry Operators Component (Bottom) -->
  <app-registered-data-entry-operators></app-registered-data-entry-operators>
</div>
