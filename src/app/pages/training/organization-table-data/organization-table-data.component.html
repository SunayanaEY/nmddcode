<div class="training-centre-container">
  <!-- Breadcrumb -->
  <app-breadcrumb [items]="breadcrumbItems"  *ngIf="userRole != 1" ></app-breadcrumb>

  <!-- Page Header -->
  <div class="page-header">
    <h2>{{'Other  Organizations' | translate}}</h2>
    <p class="page-description">
      {{'Other Organization Data.DESCRIPTION' | translate}}
    </p>
  </div>

  <!-- Action Buttons -->
  <div class="action-buttons">
    <button class="btn btn-outline" (click)="exportToExcel()">
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.89 22 5.99 22H18C19.1 22 20 21.1 20 20V8L14 2ZM18 20H6V4H13V9H18V20Z"
          fill="currentColor"
        />
      </svg>
      {{'Export Data' | translate}}
    </button>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading-container">
    <div class="loading-spinner"></div>
    <p>{{'Loading Other  Organizations...' | translate}}</p>
  </div>

  <!-- Error State -->
  <div *ngIf="error" class="error-container">
    <div class="error-message">
      <svg
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M12 2C6.48 2 2 6.48 2 12S6.48 22 12 22 22 17.52 22 12 17.52 2 12 2ZM13 17H11V15H13V17ZM13 13H11V7H13V13Z"
          fill="currentColor"
        />
      </svg>
      <p>{{ error }}</p>
      <button class="btn btn-primary" (click)="loadInstituteData()">
        Retry
      </button>
    </div>
  </div>

  <!-- Training Centres Table -->
  <div *ngIf="!isLoading && !error" class="table-container">
    <app-table
      [columns]="tableColumns"
      [data]="trainingCentres"
      [actions]="tableActions"
      (actionClick)="onTableAction($event)"
    >
    </app-table>
  </div>
</div>

<!-- Generic Modal Component -->
<app-modal
  #editModal
  [show]="showModal"
  [config]="modalConfig"
  [data]="selectedCentre"
  [mode]="modalMode"
  (close)="closeModal()"
  (primaryAction)="onModalPrimaryAction($event)"
  (fieldChange)="onModalFieldChange($event)"
>
</app-modal>

<!-- Confirmation Modal -->
<app-modal
  [show]="showConfirmModal"
  [config]="confirmModalConfig"
  [data]="{ confirmationText: confirmationText }"
  mode="edit"
  (close)="onCancelToggle()"
  (primaryAction)="onConfirmToggle($event)"
  (secondaryAction)="onCancelToggle()"
>
</app-modal>
