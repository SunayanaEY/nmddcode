<div class="manual-training-container">
  <app-breadcrumb [items]="breadcrumbItems"></app-breadcrumb>

  <!-- Header Section -->
  <div class="header-section">
    <div class="header-left">
      <h1 class="page-title">Manual Training Upload</h1>
    </div>
    <div class="header-right">
      <button type="button" class="btn btn-new-row" (click)="openAddModal()">
        <i class="bi bi-plus"></i>
        New Row
      </button>
    </div>
  </div>

  <!-- Data Table -->
  <app-table [data]="participants" [columns]="tableColumns" [actions]="tableActions"
    (actionClick)="handleTableAction($event)"></app-table>

  <!-- Action Buttons -->
  <div class="form-actions">
    <button type="button" class="btn btn-outline-secondary btn-lg me-3">Save Draft</button>
    <button type="button" class="btn btn-primary btn-lg">Submit for Verification</button>
  </div>
</div>

<!-- Add Participant Modal -->
<div class="modal fade" id="addParticipantModal" tabindex="-1" aria-labelledby="addParticipantModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addParticipantModalLabel">Add Fields</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="participantForm" (ngSubmit)="addParticipant()">
          <div class="row">
            <div class="col-md-4">
              <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" formControlName="name" placeholder="Enter Name">
              </div>
            </div>
            <div class="col-md-4">
              <div class="mb-3">
                <label for="gender" class="form-label">Gender</label>
                <select class="form-select" id="gender" formControlName="gender">
                  <option value="">Select Gender</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>
            <div class="col-md-4">
              <div class="mb-3">
                <label for="age" class="form-label">Age</label>
                <input type="number" class="form-control" id="age" formControlName="age" placeholder="Enter Age">
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="contactNumber" class="form-label">Contact Number</label>
                <input type="tel" class="form-control" id="contactNumber" formControlName="contactNumber" placeholder="Enter Phone Number">
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="aadhar" class="form-label">Aadhar</label>
                <input type="text" class="form-control" id="aadhar" formControlName="aadhar" placeholder="Enter Aadhar Number">
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <div class="mb-3">
                <label for="email" class="form-label">Email(Optional)</label>
                <input type="email" class="form-control" id="email" formControlName="email" placeholder="Enter Email">
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" (click)="addParticipant()">Submit</button>
      </div>
    </div>
  </div>
</div>
