<ng-template #trainingDetailsModal let-modal>
  <div
    class="modal-header bg-appColor"
    style="background-color: #155e91; color: white !important"
  >
    <h3 class="my-auto text-white">Training Details</h3>
    <button
      type="button"
      class="close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    >
      <span aria-hidden="true">&times;</span>
    </button>
  </div>

  <div class="modal-body">
    <div class="row">
      <div
        class="col-md-6"
        *ngFor="
          let field of [
            { label: 'Training Title', value: trainingDetails?.trainingTitle },
            { label: 'Scheme', value: trainingDetails?.scheme },
            {
              label: 'Training Institute Name',
              value: trainingDetails?.trainingInstituteName
            },
            { label: 'Trainer Name', value: trainingDetails?.trainerName },
            { label: 'Training Date', value: trainingDetails?.trainingDate },
            { label: 'Training Duration', value: trainingDetails?.duration },
            {
              label: 'Mode of Training',
              value: trainingDetails?.modeOfTraining
            },
            {
              label: 'Training Description',
              value: trainingDetails?.trainingDescription
            },
            { label: 'Location', value: trainingDetails?.location },
            { label: 'Status', value: trainingDetails?.status }
          ]
        "
      >
        <div class="d-flex mr-4 form-group half-width">
          <h4 class="my-auto mr-2 form-control-label detailsWidth">
            {{ field.label }}:
          </h4>
          <p class="my-auto mb-0 detailsValue">{{ field.value }}</p>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button
      type="button"
      class="btn btn-primary"
      (click)="modal.dismiss('Close click')"
      style="background-color: #155e91"
    >
      Close
    </button>
  </div>
</ng-template>
