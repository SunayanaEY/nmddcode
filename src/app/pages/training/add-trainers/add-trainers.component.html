<div class="main-content-wrapper">
  <div class="certificate-form-container">
    <!-- Header Section -->
    <div class="form-header">
      <app-breadcrumb [items]="breadcrumbItems"></app-breadcrumb>
      <h1 class="page-title">Trainer Profile Creation</h1>
    </div>

    <!-- Form Content -->
    <div class="form-content">
      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
        <!-- Operator Details Section -->
        <div class="form-section">
          <h3 class="section-title">Trainer Details</h3>

          <div class="form-row">
            <div class="form-group half-width">
              <label for="trainerName"
                >Trainer Name <span class="required">*</span></label
              >
              <input
                type="text"
                id="trainerName"
                formControlName="trainerName"
                placeholder="Enter the Manager Name here"
                class="form-control"
                [class.is-invalid]="
                  profileForm.get('trainerName')?.invalid &&
                  profileForm.get('trainerName')?.touched
                "
              />
              <div
                *ngIf="
                  profileForm.get('trainerName')?.invalid &&
                  profileForm.get('trainerName')?.touched
                "
                class="invalid-feedback"
              >
                Trainer name is required
              </div>
            </div>
            <div class="form-group half-width">
              <label for="expertiseIn"
                >Expertise In <span class="required">*</span></label
              >
              <input
                type="text"
                id="expertiseIn"
                formControlName="expertiseIn"
                placeholder="Enter the expertise here"
                class="form-control"
                [class.is-invalid]="
                  profileForm.get('expertiseIn')?.invalid &&
                  profileForm.get('expertiseIn')?.touched
                "
              />
              <div
                *ngIf="
                  profileForm.get('expertiseIn')?.invalid &&
                  profileForm.get('expertiseIn')?.touched
                "
                class="invalid-feedback"
              >
                Expertise Field is required
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group half-width">
              <label for="mobile"
                >Contact Number <span class="required">*</span></label
              >
              <input
                type="tel"
                id="mobile"
                formControlName="mobile"
                placeholder="Enter 10-digit Contact Number"
                class="form-control"
                [class.is-invalid]="
                  profileForm.get('mobile')?.invalid &&
                  profileForm.get('mobile')?.touched
                "
              />
              <div
                *ngIf="
                  profileForm.get('mobile')?.invalid &&
                  profileForm.get('mobile')?.touched
                "
                class="invalid-feedback"
              >
                <div
                  *ngIf="profileForm.get('mobile')?.errors?.['required']"
                >
                  Contact number is required
                </div>
                <div
                  *ngIf="profileForm.get('mobile')?.errors?.['pattern']"
                >
                  Please enter a valid 10-digit contact number
                </div>
              </div>
            </div>
            <div class="form-group half-width">
              <label for="email"
                >Email ID <span class="required">*</span></label
              >
              <input
                type="email"
                id="email"
                formControlName="email"
                placeholder="Enter the Email ID here"
                class="form-control"
                [class.is-invalid]="
                  profileForm.get('email')?.invalid &&
                  profileForm.get('email')?.touched
                "
              />
              <div
                *ngIf="
                  profileForm.get('email')?.invalid &&
                  profileForm.get('email')?.touched
                "
                class="invalid-feedback"
              >
                <div *ngIf="profileForm.get('email')?.errors?.['required']">
                  Email ID is required
                </div>
                <div *ngIf="profileForm.get('email')?.errors?.['email']">
                  Please enter a valid email address
                </div>
              </div>
            </div>
          </div>

        </div>

        <div class="form-actions">
          <button
            type="submit"
            class="btn btn-primary btn-lg"
            [disabled]="isLoading || profileForm.invalid"
          >
            <span
              *ngIf="isLoading"
              class="spinner-border spinner-border-sm me-2"
              role="status"
              aria-hidden="true"
            ></span>
            {{ isLoading ? "Creating Profile..." : "Create Profile" }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!--Table-->
