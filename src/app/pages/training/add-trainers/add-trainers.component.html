<div class="main-content-wrapper">
  <div class="certificate-form-container">

    <!-- Header Section -->
    <div class="form-header">
      <app-breadcrumb [items]="breadcrumbItems"></app-breadcrumb>

      <div class="page-header-content">
        <div class="header-left">
          <h1 class="page-title">{{'Trainer Management'|translate}}</h1>
          <p class="page-description">
            {{'Manage trainer registrations and view existing trainers'|translate}}
          </p>
        </div>

        <div class="header-right">
          <button 
            type="button" 
            class="btn btn-primary register-btn"
            [class.btn-danger]="showRegistrationForm"
            (click)="toggleRegistrationForm()">

            <i class="bi"
              [class.bi-plus-circle]="!showRegistrationForm"
              [class.bi-x-circle]="showRegistrationForm">
            </i>

            {{ showRegistrationForm ? ('Hide Form'|translate) : ('Register New Trainers'|translate) }}
          </button>
        </div>
      </div>
    </div>

    <!-- Registration Form Section -->
    <div class="registration-form-section" *ngIf="showRegistrationForm">
      <div class="form-content">

        <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">

          <div class="form-section">
            <h3 class="section-title">
              {{ isEditMode ? ('Update Trainer'|translate) : ('Trainer Details'|translate) }}
            </h3>

            <div class="form-row">

              <div class="form-group half-width">
                <label>Trainer Name <span class="required">*</span></label>
                <input type="text" formControlName="trainerName" class="form-control">
              </div>

              <div class="form-group half-width">
                <label>Expertise In <span class="required">*</span></label>
                <input type="text" formControlName="expertiseIn" class="form-control">
              </div>
            </div>

            <div class="form-row">

              <div class="form-group half-width">
                <label>Contact Number <span class="required">*</span></label>
                <input type="tel" formControlName="mobile" class="form-control">
              </div>

              <div class="form-group half-width">
                <label>Email ID <span class="required">*</span></label>
                <input type="email" formControlName="email" class="form-control">
              </div>

            </div>
          </div>

          <div class="form-actions">
            <button
              type="submit"
              class="btn btn-primary btn-lg"
              [disabled]="isLoading || profileForm.invalid">

              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>

              {{ isEditMode ? ('Update Trainer'|translate) : ('Create Profile'|translate) }}
            </button>
          </div>

        </form>
      </div>
    </div>

    <!-- Trainers Table -->
    <div class="form-content mt-4">
      <div class="form-section">
        <h3 class="section-title">{{'Registered Trainers'|translate}}</h3>

        <app-table
          [data]="trainersData"
          [columns]="tableColumns"
          [isLoading]="isTableLoading"
          [actions]="tableActions"
          (actionClick)="onActionClick($event)"
          tableName="trainers"
          (edit)="onEditTrainer($event)"
          (delete)="onDeleteTrainer($event)">
        </app-table>

      </div>
    </div>

  </div>
</div>
