<div class="login-container">
  <!-- Background Image -->
  <div class="bg-photo"></div>
  
  <!-- Government Logo Header -->
  <div class="goi-logo">
    <div class="goi-logo-content">
      <div class="emblem">
          <img src="assets/login/emblem.png" alt="Government Emblem">
      </div>
      <div class="text-content">
        <div class="government-text">
          <span class="hindi-text">भारत सरकार</span>
          <div class="separator-lines">
            <div class="line"></div>
            <div class="line"></div>
          </div>
          <span class="english-text">GOVERNMENT OF INDIA</span>
        </div>
        <div class="department-text">
          <div class="hindi-dept">पशुपालन और डेयरी विभाग</div>
          <div class="english-dept">DEPARTMENT OF ANIMAL HUSBANDRY AND DAIRYING</div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Login Form -->
  <div class="login-form-container">
    <div class="login-form-blur">
      <div class="login-form-content">
        <h1 class="login-title">Dashboard Sign In</h1>
        
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          <div class="error-message" *ngIf="credentialdata">
            {{credentialdata}}
          </div>
          
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-container">
              <input 
                id="inputUsename" 
                type="text" 
                formControlName="usename"
                [ngClass]="{ 'is-invalid': submitted && f['usename'].errors }" 
                placeholder="Enter Email"
                class="form-input">
            </div>
            <div *ngIf="submitted && f['usename'].errors" class="invalid-feedback">
              <div *ngIf="f['usename'].errors?.['required']">Email is required</div>
              <div *ngIf="f['usename'].errors?.['email']">Email must be a valid</div>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-container password-container">
              <input 
                id="inputPassword" 
                [type]="showPassword ? 'text' : 'password'" 
                formControlName="password"
                [ngClass]="{ 'is-invalid': submitted && f['password'].errors }" 
                placeholder="Password"
                class="form-input">
              <button type="button" class="password-toggle" (click)="togglePassword()">
                <i class="eye-icon" [class.show]="showPassword"></i>
              </button>
            </div>
            <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
              <div *ngIf="f['password'].errors?.['required']">Password is required</div>
            </div>
          </div>
          
          <div class="forgot-password">
            <a href="#">Forgot Password?</a>
          </div>
          
          <button type="submit" class="signin-button">
            Sign in
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
