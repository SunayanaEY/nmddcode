<div class="login-page">
  <button class="btn-download-cert" (click)="downloadCertificate()">
    <i class="fas fa-download me-2"></i> {{ "Download Certificate" | translate }}
  </button>

  <div class="login-card">
    <div class="card-left">
      <div class="emblem-section">
        <img src="assets/login/emblem.png" alt="Emblem" class="emblem" />
      </div>
      
      <div class="branding-section">
        <p class="gov-text">भारत सरकार | GOVERNMENT OF INDIA</p>
        <p class="dept-text">पशुपालन और डेयरी विभाग</p>
        <p class="dept-text">DEPARTMENT OF ANIMAL HUSBANDRY AND DAIRYING</p>
        <p class="vidya-text">विद्यापीठ | VIDYAPEETH</p>
      </div>
      
      <!-- Hidden Map Section -->
      <div class="map-section" *ngIf="false">
        <app-india-map
          [selectedState]="selectedState"
          [variant]="'login'"
          (stateSelected)="onStateSelected($event)"
        ></app-india-map>
      </div>
    </div>

    <div class="card-right">
      <div class="login-form-container">
        <!-- <h1>विद्यापीठ | VIDYAPITH</h1> -->
        <h2 class="login-title">Sign In</h2>

        <form [formGroup]="signInForm" (ngSubmit)="onSignIn()">
          <div class="form-group">
            <label>Username</label>
            <input
              type="text"
              formControlName="username"
              placeholder="Enter Username"
              [class.is-invalid]="signInForm.get('username')?.invalid && signInForm.get('username')?.touched"
            />
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="password-input-wrapper">
              <input
                [type]="showPassword ? 'text' : 'password'"
                formControlName="password"
                placeholder="Password"
                [class.is-invalid]="signInForm.get('password')?.invalid && signInForm.get('password')?.touched"
              />
              <span class="password-toggle" (click)="togglePassword()">
                <i class="fas" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
              </span>
            </div>
          </div>

          <div class="form-actions">
            <a
              [routerLink]="['/forget-password']"
              [queryParams]="{ type: 'forget' }"
              class="forgot-password"
            >
              Forgot Password?
            </a>
          </div>

          <div *ngIf="errorMessage" class="error-message mb-3">
            {{ errorMessage | translate }}
          </div>

          <button type="submit" class="btn-submit" [disabled]="isLoading">
            <span *ngIf="!isLoading">Sign In</span>
            <span *ngIf="isLoading"><i class="fas fa-spinner fa-spin"></i> Signing In...</span>
          </button>

        </form>

        <div class="secure-badge">
          <i class="fas fa-lock"></i> Secure Government Portal 
        </div>
      </div>
    </div>
  </div>

  <app-modal
    [show]="showModal"
    [config]="modalConfig"
    mode="create"
    (close)="onClose()"
    (primaryAction)="onSubmit($event)"
    (secondaryAction)="onSecondaryAction()"
  >
  </app-modal>

  <div class="modal fade" id="viewCertificateModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Approved Certificate</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" *ngIf="selectedItem">
          <app-latest-certificate-layout [data]="selectedItem"></app-latest-certificate-layout>
        </div>
      </div>
    </div>
  </div>
</div>
