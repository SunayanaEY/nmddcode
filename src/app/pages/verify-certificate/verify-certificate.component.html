<div class="container py-3">
  <ng-container *ngIf="certificateData; else stateBlock">
    <app-latest-certificate-layout [data]="certificateData" [uniqueId]="uniqueId || ''"></app-latest-certificate-layout>
  </ng-container>

  <ng-template #stateBlock>
    <div *ngIf="isLoading" class="alert alert-info">Loading certificate...</div>
    <div *ngIf="!isLoading && error" class="alert alert-danger">{{ error }}</div>
  </ng-template>
</div>
