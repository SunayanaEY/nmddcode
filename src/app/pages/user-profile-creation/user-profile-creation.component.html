<div class="main-content-wrapper">
  <div class="certificate-form-container">
    <!-- Header Section -->
    <div class="form-header">
      <app-breadcrumb [items]="breadcrumbItems"></app-breadcrumb>
      <h1 class="page-title">User Profile Creation</h1>
    </div>

    <!-- Form Content -->
    <div class="form-content">
      <!-- Success Message -->
      <div *ngIf="successMessage" class="alert alert-success" role="alert">
        <i class="fas fa-check-circle"></i>
        {{ successMessage }}
        <button type="button" class="btn-close" (click)="clearMessages()" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
        <i class="fas fa-exclamation-circle"></i>
        {{ errorMessage }}
        <button type="button" class="btn-close" (click)="clearMessages()" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
        <!-- Institute Details Section -->
        <div class="form-section">
          <h3 class="section-title">Institute Details</h3>

          <div class="form-row">
            <div class="form-group half-width">
              <label for="instituteName">Institute Name</label>
              <input
                type="text"
                id="instituteName"
                formControlName="instituteName"
                placeholder="Enter the Institute Name here"
                class="form-control"
                [class.is-invalid]="profileForm.get('instituteName')?.invalid && profileForm.get('instituteName')?.touched"
              />
            </div>
            <div class="form-group half-width">
              <label for="scheme">Scheme</label>
              <select
                id="scheme"
                formControlName="scheme"
                class="form-control"
                [class.is-invalid]="profileForm.get('scheme')?.invalid && profileForm.get('scheme')?.touched"
              >
                <option value="" disabled selected>Enter the Name of Scheme here</option>
                <option value="scheme1">Scheme 1</option>
                <option value="scheme2">Scheme 2</option>
                <option value="scheme3">Scheme 3</option>
              </select>
            </div>
          </div>

          <!-- Location/Venue -->
          <div class="form-row">
            <div class="form-group location-label">
              <label>Location / Venue</label>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group third-width">
              <select
                formControlName="state"
                class="form-control"
                [class.is-invalid]="profileForm.get('state')?.invalid && profileForm.get('state')?.touched"
              >
                <option value="" disabled selected>State</option>
                <option value="up">Uttar Pradesh</option>
                <option value="delhi">Delhi</option>
                <option value="mumbai">Mumbai</option>
              </select>
            </div>
            <div class="form-group third-width">
              <select
                formControlName="district"
                class="form-control"
                [class.is-invalid]="profileForm.get('district')?.invalid && profileForm.get('district')?.touched"
              >
                <option value="" disabled selected>District</option>
                <option value="lucknow">Lucknow</option>
                <option value="kanpur">Kanpur</option>
                <option value="agra">Agra</option>
              </select>
            </div>
            <div class="form-group third-width">
              <select
                formControlName="block"
                class="form-control"
                [class.is-invalid]="profileForm.get('block')?.invalid && profileForm.get('block')?.touched"
              >
                <option value="" disabled selected>Block</option>
                <option value="block1">Block 1</option>
                <option value="block2">Block 2</option>
                <option value="block3">Block 3</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group full-width">
              <label for="registrationId"
                >Registration ID or UIN (if applicable)</label
              >
              <input
                type="text"
                id="registrationId"
                formControlName="registrationId"
                placeholder="Enter the Registration ID or UIN here"
                class="form-control"
              />
            </div>
          </div>
        </div>

        <!-- Contact Person Details Section -->
        <div class="form-section">
          <h3 class="section-title">Contact Person Details</h3>

          <div class="form-row">
            <div class="form-group half-width">
              <label for="contactPersonName">Contact Person Name</label>
              <input
                type="text"
                id="contactPersonName"
                formControlName="contactPersonName"
                placeholder="Enter the Contact Person Name here"
                class="form-control"
                [class.is-invalid]="profileForm.get('contactPersonName')?.invalid && profileForm.get('contactPersonName')?.touched"
              />
            </div>
            <div class="form-group half-width">
              <label for="designation">Designation</label>
              <input
                type="text"
                id="designation"
                formControlName="designation"
                placeholder="Enter the Designation here"
                class="form-control"
                [class.is-invalid]="profileForm.get('designation')?.invalid && profileForm.get('designation')?.touched"
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group half-width">
              <label for="contactNumber">Contact Number</label>
              <input
                type="tel"
                id="contactNumber"
                formControlName="contactNumber"
                placeholder="Enter the Contact Number here"
                class="form-control"
                [class.is-invalid]="profileForm.get('contactNumber')?.invalid && profileForm.get('contactNumber')?.touched"
              />
            </div>
            <div class="form-group half-width">
              <label for="emailId">Email ID</label>
              <input
                type="email"
                id="emailId"
                formControlName="emailId"
                placeholder="Enter the Email ID here"
                class="form-control"
                [class.is-invalid]="profileForm.get('emailId')?.invalid && profileForm.get('emailId')?.touched"
              />
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button 
            type="submit" 
            class="btn btn-primary btn-lg"
            [disabled]="isLoading || profileForm.invalid"
          >
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            {{ isLoading ? 'Submitting...' : 'Submit' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
